<!DOCTYPE html>
<!--
  Кыргызча — キルギス語 A1/A2 学習アプリ（v3）
  ============================================================
  教材・著作権メモ（README相当）:
  - 単語1300語（A1 900 / A2 400）と A2 瞬間作文400文を主データとして使用。
  - 例文・文法解説は、既存教材・Web教材・辞書・会話集からコピーしない方針で
    新規作成した draft（reviewStatus: draft_native_check_required）。
  - 現状は個人・家族利用／プロトタイプ向け。販売（App Store等）前には必ず:
      1) キルギス語ネイティブによる全単語・全例文・全文法解説の確認
      2) カタカナ読みの品質確認
      3) 著作権・商標・教材権利の専門家レビュー
      4) 音声追加時は話者・録音者との権利契約
      5) プライバシーポリシー・利用規約の整備
      6) App Store Review Guidelines への適合確認
  - 本アプリは外部通信・広告・解析タグ・外部JS・APIキーを一切使用しない
    （単一HTML / localStorage のみ）。
  ============================================================
-->

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#B3261E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Кыргызча">
<title>Кыргызча — A1・A2</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23E03131'/%3E%3Ccircle cx='50' cy='50' r='30' fill='none' stroke='%23F2B705' stroke-width='4'/%3E%3C/svg%3E">
<style>
  :root{
    --red:#E03131; --redDeep:#B3261E; --gold:#F2B705; --goldSoft:#F7D26B;
    --ink:#211D18; --paper:#FBF7EF; --card:#FFFFFF; --teal:#168F8B;
    --muted:#857C70; --line:#E7DECB; --good:#2F9E44; --warn:#E8590C; --yellow:#E6A700;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{background:var(--paper);color:var(--ink);padding-bottom:calc(20px + env(safe-area-inset-bottom));
    font-family:system-ui,-apple-system,"Helvetica Neue","Hiragino Sans","Noto Sans JP",sans-serif;
    -webkit-text-size-adjust:100%;line-height:1.5}
  .wrap{max-width:600px;margin:0 auto}
  header.app{background:linear-gradient(135deg,var(--red),var(--redDeep));color:#fff;
    padding:calc(14px + env(safe-area-inset-top)) 16px 12px}
  header.app .row{display:flex;align-items:center;gap:12px;max-width:600px;margin:0 auto}
  header.app h1{margin:0;font-size:22px;font-weight:800;letter-spacing:.5px}
  header.app p{margin:1px 0 0;font-size:11.5px;opacity:.9}
  .gear{margin-left:auto;background:rgba(255,255,255,.16);border:none;color:#fff;padding:8px 13px;
    border-radius:10px;font-size:13px;font-weight:800;cursor:pointer}
  nav.tabs{position:sticky;top:0;z-index:20;background:var(--paper);border-bottom:1px solid var(--line)}
  nav.tabs .inner{max-width:600px;margin:0 auto;display:flex}
  nav.tabs button{flex:1;padding:14px 2px;background:transparent;border:none;border-bottom:3px solid transparent;
    cursor:pointer;color:var(--muted);min-height:50px;display:flex;align-items:center;justify-content:center}
  nav.tabs button.on{color:var(--ink);border-bottom-color:var(--red)}
  nav.tabs .t{font-size:15px;font-weight:800}
  main{max-width:600px;margin:0 auto;padding:16px 14px 0}
  .btn{appearance:none;border:1.5px solid var(--line);background:#fff;color:var(--ink);
    padding:12px 14px;border-radius:13px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;min-height:46px}
  .btn:active{transform:translateY(1px)}
  .full{width:100%}
  .ghost{background:transparent;color:var(--muted)}
  .seg{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
  .seg button{flex:1;min-width:62px;padding:9px 6px;border-radius:99px;font-size:13.5px;font-weight:800;
    cursor:pointer;white-space:nowrap;border:1.5px solid var(--line);background:#fff;color:var(--muted);min-height:42px}
  .badge{font-size:11.5px;font-weight:800;color:#fff;padding:2px 9px;border-radius:99px;display:inline-block}
  .bar{height:8px;background:var(--line);border-radius:99px;overflow:hidden}
  .bar>i{display:block;height:100%;background:var(--teal);border-radius:99px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:0 6px 22px rgba(33,29,24,.06)}
  .muted{color:var(--muted)}
  .small{font-size:12px}
  .h2{font-size:13px;font-weight:800;color:var(--muted);margin:18px 2px 8px}
  .packrow{display:flex;align-items:center;gap:12px;padding:13px 14px;border:1px solid var(--line);
    border-radius:14px;background:#fff;margin-bottom:10px;cursor:pointer}
  .packrow .meta{flex:1;min-width:0}
  .packrow .nm{font-weight:800;font-size:15px}
  .packrow .ct{font-size:12px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .packrow .rt{text-align:right;font-size:12px;color:var(--muted);min-width:64px}
  .packrow .rt b{font-size:16px;color:var(--ink);font-variant-numeric:tabular-nums}
  .pill{display:inline-block;font-size:11px;font-weight:800;padding:1px 8px;border-radius:99px;background:#FFF1E8;color:var(--warn)}
  /* study card */
  .study .top{display:flex;align-items:center;gap:8px;margin-bottom:12px}
  .study .qcard{padding:24px 20px;text-align:center;position:relative}
  .study .jp{font-size:24px;font-weight:800;line-height:1.4}
  .study .kgbig{font-size:38px;font-weight:800;color:var(--redDeep);line-height:1.35;word-break:break-word}
  .study .kana{font-size:19px;color:var(--teal);font-weight:800;margin-top:8px}
  .study .kana.dim{opacity:.18}
  .study .mean{font-size:17px;margin-top:12px;font-weight:600}
  .study .exp{margin-top:12px;padding:13px 15px;background:#FFF7E8;border:1px solid var(--goldSoft);border-radius:12px;
    font-size:14px;line-height:1.7;text-align:left}
  .study .ex{margin-top:10px;padding:12px 14px;background:#F3F8F5;border:1px solid #CDE6DA;border-radius:12px;text-align:left}
  .study .ex .kg{font-weight:700;color:var(--redDeep);font-size:16px}
  .study .ex .ja{font-size:13px;color:var(--muted);margin-top:2px}
  .grambox{margin-top:12px;padding:14px 16px;background:#F0FAF7;border:1px solid #BFE5DC;border-radius:12px;text-align:left}
  .grambox .h{font-size:12.5px;font-weight:800;color:var(--teal);margin-bottom:6px}
  .grambox .b{font-size:14.5px;color:var(--ink);line-height:1.75;white-space:pre-line}
  details.more{margin-top:10px;text-align:left;border:1px solid var(--line);border-radius:12px;overflow:hidden}
  details.more>summary{list-style:none;cursor:pointer;padding:11px 14px;font-weight:800;font-size:13.5px;
    color:var(--teal);background:#F7FBFA}
  details.more>summary::-webkit-details-marker{display:none}
  details.more .inner{padding:12px 14px;font-size:13.5px;line-height:1.8}
  .kv{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
  .kv span{font-size:12px;background:#F3EEE2;border-radius:8px;padding:3px 9px;color:#5e564a}
  .ans3{display:flex;gap:8px;margin-top:14px}
  .ans3 button{flex:1;border:none;color:#fff;border-radius:13px;font-size:14px;font-weight:800;padding:14px 4px;
    cursor:pointer;min-height:54px}
  .a-no{background:var(--warn)} .a-mb{background:var(--yellow)} .a-ok{background:var(--good)}
  .star{position:absolute;top:12px;right:12px;background:none;border:none;font-size:22px;cursor:pointer;color:#d9cdb4}
  .star.on{color:var(--gold)}
  .spk{position:absolute;top:12px;left:12px;background:var(--teal);color:#fff;border:none;width:38px;height:38px;
    border-radius:50%;font-size:17px;cursor:pointer}
  .lvtag{position:absolute;top:14px;left:14px}
  .empty{margin-top:22px;padding:30px 20px;text-align:center;color:var(--muted);border:1px dashed var(--line);
    border-radius:16px;background:#fff;font-size:14.5px;line-height:1.7;white-space:pre-line}
  /* progress */
  .stat{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .stat .b{background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px 14px}
  .stat .n{font-size:24px;font-weight:800;font-variant-numeric:tabular-nums}
  .stat .l{font-size:12px;color:var(--muted)}
  .reviewcat{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border:1px solid var(--line);
    border-radius:13px;background:#fff;margin-bottom:8px}
  .reviewcat .n{font-weight:800;font-size:18px;font-variant-numeric:tabular-nums}
  /* modal */
  .ovl{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:50;display:flex;align-items:flex-end;justify-content:center}
  .sheet{background:var(--paper);width:100%;max-width:600px;border-radius:20px 20px 0 0;max-height:88vh;overflow:auto;
    padding:18px 16px calc(24px + env(safe-area-inset-bottom))}
  .sheet h3{margin:2px 0 14px;font-size:18px}
  .setrow{margin-bottom:16px}
  .setrow .lab{font-size:13.5px;font-weight:800;margin-bottom:7px}
  .resume{background:#FFF7E8;border:1px solid var(--goldSoft);border-radius:14px;padding:12px 14px;margin-bottom:14px;
    display:flex;align-items:center;gap:10px}
  .resume .btn{padding:8px 12px;min-height:0}
  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(24px + env(safe-area-inset-bottom));
    background:#211D18;color:#fff;padding:10px 16px;border-radius:99px;font-size:13px;z-index:80;opacity:0;
    transition:opacity .2s;pointer-events:none}
  .toast.show{opacity:1}
  .lock{opacity:.5}
</style>
</head>

丁寧表現・基本応答","targetWords":["мен","бишкекте","жашайм"],"copyrightNote":"original_draft","reviewStatus":"draft_native_check_required"},{"id":"C-A2-005","ja":"キルギス語を少し話せます。","ky":"Мен кыргызча аз сүйлөй алам.","kana":"メン クルグズチャ アズ スュウリョウ アラム.","roma":"men kyrgyzcha az süylöy alam.","grammar":"「Мен кыргызча аз сүйлөй алам.」は「キルギス語を少し話せます。」をキルギス語で言うための短い実用文です。\n動詞＋ала- は「〜できる」を表します。否定は ала албайм のように「できない」になります。\n-ам/-ем 系は現在・近い未来の1人称で、「私は〜します／〜する予定です」を表します。\n主な構成語: мен / кыргызча / аз / сүйлөй / алам。\n自己紹介・聞き返しの文なので、短くそのまま暗記すると会話の入口で使いやすいです。","level":"A2","unit":"Unit 01：あいさつ・自己紹介・基本応答","grammarPoint":"丁寧表現・基本応答","targetWords":["мен","кыргызча","аз","сүйлөй","алам"],"copyrightNote":"original_draft","reviewStatus":"draft_native_check_required"},{"id":"C-A2-006","ja":"まだよく分かりません。","ky":"Мен азырынча жакшы түшүнбөйм.","kana":"メン アズルンチャ ジャクシュ テュシュンビョウム.","roma":"men azyryncha jakshy tüshünböym.","grammar":"「Мен азырынча жакшы түшүнбөйм.」は「まだよく分かりません。」をキルギス語で言うための短い実用文です。\n-ам/-ем 系は現在・近い未来の1人称で、「私は〜します／〜する予定です」を表します。\n-бай/-бей は動詞の否定で、「〜しない／〜していない」を作ります。\n主な構成語: мен / азырынча / жакшы / түшүнбөйм。\n自己紹介・聞き返しの文なので、短くそのまま暗記すると会話の入口で使いやすいです。","level":"A2","unit":"Unit 01：あいさつ・自己紹介・基本応答","grammarPoint":"丁寧表現・基本応答","targetWords":["мен","азырынча","жакшы","түшүнбөйм"],"copyrightNote":"original_draft","reviewStatus":"draft_native_check_required"},{"id":"C-A2-007","ja":"もう一度言ってください。","ky":"Кайра айтыңызчы.","kana":"カウラ アウトゥングズチュ.","roma":"kayra aytyngyzchy.","grammar":"「Кайра айтыңызчы.」は「もう一度言ってください。」をキルギス語で言うための短い実用文です。\n-ңыз/-ңиз/-ңуз/-ңүз は丁寧な命令・依頼の語尾で、相手に失礼なく頼む時に使います。\n-чы/-чү は依頼をやわらげる助詞で、「〜してくださいね／お願いします」に近い響きになります。\n主な構成語: кайра / айтыңызчы。\n自己紹介・聞き返しの文なので、短くそのまま暗記すると会話の入口で使いやすいです。","level":"A2","unit":"Unit 01：あいさつ・自己紹介・基本応答","grammarPoint":"丁寧表現・基本応答","targetWords":["кайра","айтыңызчы"],"copyrightNote":"original_draft","reviewStatus":"draft_native_check_required"},{"id":"C-A2-008","ja":"ゆっくり話してください。","ky":"Жайыраак сүйлөңүзчү.","kana":"ジャウウラアク スュウリョンギュズチュ.","roma":"jayyraak süylöngüzchü.","grammar":"「Жайыраак сүйлөңүзчү.」は「ゆっくり話してください。」をキルギス語で言うための短い実用文です。\n-ңыз/-ңиз/-ңуз/-ңүз は丁寧な命令・依頼の語尾で、相手に失礼なく頼む時に使います。\n-чы/-чү は依頼をやわらげる助詞で、「〜してくださいね／お願いします」に近い響きになります。\n-ыраак/-ирээк は比較の語尾で、「より〜／もっと〜」を表します。\n主な構成語: жайыраак / сүйлөңүзчү。\n自己紹介・聞き返しの文なので、短くそのまま暗記すると会話の入口で使いやすいです。","level":"A2","unit":"Unit 01：あいさつ・自己紹介・基本応答","grammarPoint":"丁寧表現・基本応答","targetWords":["жайыраак","сүйлөңүзчү"],"copyrightNote":"original_draft","reviewStatus":"draft_native_check_required"},{"id":"C-A2-009","ja":"これを書いてください。","ky":"Муну жазып бериңизчи.","kana":"ムヌ ジャズプ ベリンギズチ.","roma":"munu jazyp beringizchi.","grammar":"「Муну жазып бериңизчи.」は「これを書いてください。」をキルギス語で言うための短い実用文です。\n-ды/-ди/-ду/-дү は目的語を示す語尾で、「〜を」に当たります。\nбер- は「与える」ですが、動詞と組み合わせると「〜してくれる」の丁寧な依頼になります。\n-ңыз/-ңиз/-ңуз/-ңүз は丁寧な命令・依頼の語尾で、相手に失礼なく頼む時に使います。\n主な構成語: муну / жазып / бериңизчи。\n自己紹介・聞き返しの文なので、短くそのまま暗記すると会話の入口で使いやすいです。","level":"A2","unit":"Unit 01：あいさつ・自己紹介・基本応答","grammarPoint":"丁寧表現・基本応答","targetWords":["муну","жазып","бериңизчи"],"copyrightNote":"original_draft","reviewStatus":"draft_native_check_required"},{"id":"C-A2-010","ja":"これはキルギス語で何と言いますか。","ky":"Бул кыргызча эмне деп айтылат?","kana":"ブル クルグズチャ エムネ デプ アウトゥラト?","roma":"bul kyrgyzcha emne dep aytylat?","grammar":"「Бул кыргызча эмне деп айтылат?」は「これはキルギス語で何と言いますか。」をキルギス語で言うための短い実用文です。\n丁寧表現・基本応答 を使った表現です。語順を崩さず、短文として覚えると応用しやすいです。\n主な構成語: бул / кыргызча / эмне / деп / айтылат。\n自己紹介・聞き返しの文なので、短くそのまま暗記すると会話の入口で使いやすいです。","level":"A2","unit":"Unit 01：あいさつ・自己紹介・基本応答","grammarPoint":"丁寧表現・基本応答","targetWords":["бул","кыргызча","эмне","деп","айтылат"],"copyrightNote":"original_draft","reviewStatus":"draft_native_check_required"},{"id":"C-A2-011","ja":"すみません、分かりませんでした。","ky":"Кечиресиз, түшүнгөн жокмун.","kana":"ケチレシズ, テュシュンギョン ジョクムン.","roma":"kechiresiz, tüshüngön jokmun.","grammar":"「Кечиресиз, түшүнгөн жокмун.」は「すみません、分かりませんでした。」をキルギス語で言うための短い実用文です。\nжок は「ない」、жокмун は「私は〜していない／分からなかった」の否定表現です。\n主な構成語: кечиресиз / түшүнгөн / жокмун。\n自己紹介・ 構成語: кайра / келиш / керекпи。\n病院では、希望・症状・服薬方法を短く正確に言うことを優先します。","level":"A2","unit":"Unit 16：病院・薬・健康","grammarPoint":"診察・服薬・健康表現","targetWords":["кайра","келиш","керекпи"],"copyrightNote":"original_draft","reviewStatus":"draft_native_check_required"},{"id":"C-A2-320","ja":"処方箋をください。","ky":"Рецепт бериңизчи.","kana":"レツェプト ベリンギズチ.","roma":"retsept beringizchi.","grammar":"「Рецепт бериңизчи.」は「処方箋をください。」をキルギス語で言うための短い実用文です。\nбер- は「与える」ですが、動詞と組み合わせると「〜してくれる」の丁寧な依頼になります。\n-ңыз/-ңиз/-ңуз/-ңүз は丁寧な命令・依頼の語尾で、相手に失礼なく頼む時に使います。\n-чы/-чү は依頼をやわらげる助詞で、「〜してくださいね／お願いします」に近い響きになります。\n主な構成語: рецепт / бериңизчи。\n病院では、希望・症状・服薬方法を短く正確に言うことを優先します。","level":"A2","unit":"Unit 16：病院・薬・健康","grammarPoint":"診察・服薬・健康表現","targetWords":["рецепт","бериңизчи"],"copyrightNote":"original_draft","reviewStatus":"draft_native_check_required"},{"id":"C-A2-321","ja":"会議は何時ですか。","ky":"Жыйын саат канчада?","kana":"ジュイン サート カンチャダ?","roma":"jyyyn saat kanchada?","grammar":"「Жыйын саат канчада?」は「会議は何時ですか。」をキルギス語で言うための短い実用文です。\n-да/-де/-до/-дө/-та/-те は「〜に／〜で」を表す場所・時点の語尾です。\nканча? は「いくら／いくつ」。値段や時刻を聞く時に使います。\n主な構成語: жыйын / саат / канчада。\n仕事では、書類・会議・共有・確認の定型を覚えると職場で応用できます。","level":"A2","unit":"Unit 17：仕事・会議・書類","grammarPoint":"仕事・会議・書類依頼","targetWords":["жыйын","саат","канчада"],"copyrightNote":"original_draft","reviewStatus":"draft_native_check_required"},{"id":"C-A2-322","ja":"書類を確認してください。","ky":"Документти текшериңизчи.","kana":"ドクメントティ テクシェリンギズチ.","roma":"dokumentti teksheringizchi.","grammar":"「Документти текшериңизчи.」は「書類を確認してください。」をキルギス語で言うための短い実用文です。\n-ды/-ди/-ду/-дү は目的語を示す語尾で、「〜を」に当たります。\nтекшер- / такта- は「確認する」。書類・予定・内容を確認する時の実用動詞です。\n-ңыз/-ңиз/-ңуз/-ңүз は丁寧な命令・依頼の語尾で、相手に失礼なく頼む時に使います。\n主な構成語: документти / текшериңизчи。\n仕事では、書類・会議・共有・確認の定型を覚えると職場で応用できます。","level":"A2","unit":"Unit 17：仕事・会議・書類","grammarPoint":"仕事・会議・書類依頼","targetWords":["документти","текшериңизчи"],"copyrightNote":"original_draft","reviewStatus":"draft_native_check_required"},{"id":"C-A2-323","ja":"ここに署名してください。","ky":"Бул ж draft","reviewStatus":"draft_native_check_required"},{"id":"C-A2-361","ja":"私はそう思います。","ky":"Мен ошондой ойлойм.","kana":"メン オションドイ オウロウム.","roma":"men oshondoy oyloym.","grammar":"「Мен ошондой ойлойм.」は「私はそう思います。」をキルギス語で言うための短い実用文です。\n... деп ойлойм は「〜と思います」。意見をやわらかく述べるA2の重要文型です。\n主な構成語: мен / ошондой / ойлойм。\n会話運用では、確認・言い換え・理解確認の表現を増やすと会話が止まりにくくなります。","level":"A2","unit":"Unit 19：意見・確認・会話運用","grammarPoint":"意見・確認・理解確認","targetWords":["мен","ошондой","ойлойм"],"copyrightNote":"original_draft","reviewStatus":"draft_native_check_required"},{"id":"C-A2-362","ja":"それはよい考えです。","ky":"Бул жакшы ой.","kana":"ブル ジャクシュ オウ.","roma":"bul jakshy oy.","grammar":"「Бул жакшы ой.」は「それはよい考えです。」をキルギス語で言うための短い実用文です。\n意見・確認・理解確認 を使った表現です。語順を崩さず、短文として覚えると応用しやすいです。\n主な構成語: бул / жакшы / ой。\n会話運用では、確認・言い換え・理解確認の表現を増やすと会話が止まりにくくなります。","level":"A2","unit":"Unit 19：意見・確認・会話運用","grammarPoint":"意見・確認・理解確認","targetWords":["бул","жакшы","ой"],"copyrightNote":"original_draft","reviewStatus":"draft_native_check_required"},{"id":"C-A2-363","ja":"確認してもいいですか。","ky":"Тактап алсам болобу?","kana":"タクタプ アルサム ボロブ?","roma":"taktap alsam bolobu?","grammar":"「Тактап алсам болобу?」は「確認してもいいですか。」をキルギス語で言うための短い実用文です。\nболобу? は「可能ですか／してもよいですか」を尋ねる便利な表現です。\nтекшер- / такта- は「確認する」。書類・予定・内容を確認する時の実用動詞です。\n-сам/-сем は「もし私が〜したら／〜してもよければ」の形で、許可や条件をやわらかく表せます。\n主な構成語: тактап / алсам / болобу。\n会話運用では、確認・言い換え・理解確認の表現を増やすと会話が止まりにくくなります。","level":"A2","unit":"Unit 19：意見・確認・会話運用","grammarPoint":"意見・確認・理解確認","targetWords":["тактап","алсам","болобу"],"copyrightNote":"original_draft","reviewStatus":"draft_native_check_required"},{"id":"C-A2-364","ja":"つまり、明日ですか。","ky":"Демек, эртеңби?","kana":"デメク, エルテングビ?","roma":"demek, ertengbi?","grammar":"「Демек, эртеңби?」は「つまり、明日ですか。」をキルギス語で言うための短い実用文です。\nДемек は「つまり／ということは」。相手の話を確認して整理する時に便利です。\n-бы/-би/-бу/-бү は疑問を作る助詞で、文末に付くと「〜ですか」と確認できます。\n主な構成語: демек / эртеңби。\n会話運用では、確認・言い換え・理解確認の表現を増やすと会話が止まりにくくなります。","level":"A2","unit":"Unit 19：意見・確認・会話運用","grammarPoint":"意見・確認・理解確認"," "targetWords":["бул","дарекке","такси","менен","барам"],"copyrightNote":"original_draft","reviewStatus":"draft_native_check_required"},{"id":"C-A2-396","ja":"支払いはカードでできますか。","ky":"Төлөмдү карта менен кылса болобу?","kana":"トョリョムデュ カルタ メネン クルサ ボロブ?","roma":"tölömdü karta menen kylsa bolobu?","grammar":"「Төлөмдү карта менен кылса болобу?」は「支払いはカードでできますか。」をキルギス語で言うための短い実用文です。\nболобу? は「可能ですか／してもよいですか」を尋ねる便利な表現です。\nменен は「〜と／〜で」。家族と行く、カードで払う、現金で払うなど幅広く使います。\n-ды/-ди/-ду/-дү は目的語を示す語尾で、「〜を」に当たります。\n主な構成語: төлөмдү / карта / менен / кылса / болобу。\n総合練習なので、場面を思い浮かべて「短く伝える」ことを優先してください。","level":"A2","unit":"Unit 20：総合ロールプレイ","grammarPoint":"場面別総合練習","targetWords":["төлөмдү","карта","менен","кылса","болобу"],"copyrightNote":"original_draft","reviewStatus":"draft_native_check_required"},{"id":"C-A2-397","ja":"担当者に確認してください。","ky":"Жооптуу адамдан тактаңызчы.","kana":"ジョオプトゥウ アダムダン タクタングズチュ.","roma":"jooptuu adamdan taktangyzchy.","grammar":"「Жооптуу адамдан тактаңызчы.」は「担当者に確認してください。」をキルギス語で言うための短い実用文です。\n-дан/-ден/-дон/-дөн は「〜から」を表す出発点・由来の語尾です。\nтекшер- / такта- は「確認する」。書類・予定・内容を確認する時の実用動詞です。\n-ңыз/-ңиз/-ңуз/-ңүз は丁寧な命令・依頼の語尾で、相手に失礼なく頼む時に使います。\n主な構成語: жооптуу / адамдан / тактаңызчы。\n総合練習なので、場面を思い浮かべて「短く伝える」ことを優先してください。","level":"A2","unit":"Unit 20：総合ロールプレイ","grammarPoint":"場面別総合練習","targetWords":["жооптуу","адамдан","тактаңызчы"],"copyrightNote":"original_draft","reviewStatus":"draft_native_check_required"},{"id":"C-A2-398","ja":"後で私にメッセージを送ってください。","ky":"Кийин мага билдирүү жөнөтүңүзчү.","kana":"キイン マガ ビルディリュー ジョニョテュンギュズチュ.","roma":"kiyin maga bildirüü jönötüngüzchü.","grammar":"「Кийин мага билдирүү жөнөтүңүзчү.」は「後で私にメッセージを送ってください。」をキルギス語で言うための短い実用文です。\n-га/-ге/-го/-гө/-ка/-ке は「〜へ」を表す方向の語尾です。人に向く場合も「〜に」と訳せます。\nжөнөт- は「送る」。メールや写真を送る時に使います。\n-ңыз/-ңиз/-ңуз/-ңүз は丁寧な命令・依頼の語尾で、相手に失礼なく頼む時に使います。\n主な構成語: кийин / мага / билдирүү / жөнөтүңүзчү。\n総合練習なので、場面を思い浮かべて「短く伝える」ことを優先してください。","level":"A2","unit":"Unit 20：総合ロールプレイ","grammarPoint":"場面別総合練習","targetWords":["кийин","мага <script>
/*JS_START*/
"use strict";

function showFatal(msg){
  try{
    var m=document.getElementById('main');
    if(!m){m=document.createElement('main');m.id='main';(document.body||document.documentElement).appendChild(m);}
    m.innerHTML='<div style="margin:16px;padding:18px;background:#fff;border:1px solid #f0c2c2;border-radius:14px;color:#B3261E;font-size:13px;line-height:1.8;white-space:pre-wrap">\u26a0\ufe0f \u521d\u671f\u5316\u3067\u30a8\u30e9\u30fc\u304c\u767a\u751f\u3057\u307e\u3057\u305f\u3002\n\n\u3053\u306e\u7c21\u6613\u30d7\u30ec\u30d3\u30e5\u30fc\u3067\u306f\u306a\u304f\u3001Safari \u3067\u958b\u304f\uff08\u307e\u305f\u306f\u30db\u30fc\u30e0\u753b\u9762\u306b\u8ffd\u52a0\u3059\u308b\uff09\u3068\u6b63\u5e38\u306b\u52d5\u304f\u5834\u5408\u304c\u3042\u308a\u307e\u3059\u3002\n\n--- \u8a73\u7d30 ---\n'+String(msg)+'</div>';
  }catch(_){}
}
window.onerror=function(message,source,lineno,colno,error){showFatal((error&&error.stack)||message||'unknown error');return false;};

/* ===== injected data (parsed as JSON for engine compatibility) ===== */
var VOCAB,COMPOSE,LEGACY_KY;
try{
  VOCAB=JSON.parse(document.getElementById('data-vocab').textContent);
  COMPOSE=JSON.parse(document.getElementById('data-compose').textContent);
  LEGACY_KY=JSON.parse(document.getElementById('data-legacy').textContent);
}catch(e){showFatal('\u8a9e\u5f59\u30c7\u30fc\u30bf\u306e\u8aad\u307f\u8fbc\u307f\u306b\u5931\u6557\u3057\u307e\u3057\u305f: '+((e&&e.stack)||e));throw e;}

/* ===== constants ===== */
var SHOW_LEVELS = ["A1","A2"];           // B1は非表示（データ構造は将来対応）
var LEVEL_COLOR = {A1:"#2F9E44", A2:"#1971C2", B1:"#9C36B5"};
var K = {
  prog:"kyrgyzApp_v3_vocabProgress", cprog:"kyrgyzApp_v3_composeProgress",
  set:"kyrgyzApp_v3_settings", hist:"kyrgyzApp_v3_history",
  sess:"kyrgyzApp_v3_session", legacy:"kyrgyzApp_legacyBackup"
};
var APP_VERSION="3.0", DATA_VERSION="a1a2-1300-compose400";
var LADDER_DAYS=[1,3,7,14,30,60]; // step1..6 (step0 = 10分)

/* ===== storage helpers ===== */
var memStore={};
function lget(k,def){try{var v=localStorage.getItem(k);return v?JSON.parse(v):def;}catch(e){return (k in memStore)?memStore[k]:def;}}
function lset(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){memStore[k]=v;}}
function ldel(k){try{localStorage.removeItem(k);}catch(e){delete memStore[k];}}

/* ===== state ===== */
var settings = Object.assign({
  dailyNew:20, kanaMode:"afterReveal", direction:"ja2kg", shuffle:"order", detailOpen:false
}, lget(K.set,{}));
var progress = lget(K.prog,{});        // 単語進捗 {id:{...}}
var cprogress = lget(K.cprog,{});      // 作文進捗 {id:{...}}（別キー）
var history  = lget(K.hist,{streak:{count:0,last:null}, days:{}});
var ui = lget(K.sess,{view:"word", level:"A1", wordSub:"select", reviewSub:"list", session:null, pickPacks:[],
  composeSub:"select", composeSession:null});

/* ===== util ===== */
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function now(){return Date.now();}
function todayKey(d){d=d||new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function byId(id){return WMAP[id];}
var WMAP={}; VOCAB.forEach(function(w){WMAP[w.id]=w;});

/* packs */
var PACKS=[]; (function(){
  var seen={};
  VOCAB.forEach(function(w){
    if(!seen[w.pack]){seen[w.pack]={id:w.pack,level:w.level,title:w.packTitle||w.pack,words:[],cats:{}};PACKS.push(seen[w.pack]);}
    seen[w.pack].words.push(w.id);
    seen[w.pack].cats[w.category]=(seen[w.pack].cats[w.category]||0)+1;
  });
  PACKS.forEach(function(p){
    var best="",bn=-1; for(var c in p.cats){if(p.cats[c]>bn){bn=p.cats[c];best=c;}} p.cat=best;
  });
})();
function packsOf(level){return PACKS.filter(function(p){return p.level===level;});}

/* progress access */
function P(id){
  if(!progress[id]) progress[id]={status:"new",correctCount:0,wrongCount:0,uncertainCount:0,
    lastReviewed:null,nextReview:null,intervalDays:0,intervalStep:0,masteryLevel:0,favorite:false,correctDays:[]};
  return progress[id];
}
function hasProg(id){return !!progress[id];}
function saveAll(){lset(K.prog,progress);lset(K.cprog,cprogress);lset(K.set,settings);lset(K.hist,history);lset(K.sess,ui);}
function saveUI(){lset(K.sess,ui);}

/* history / streak */
function dayRec(k){k=k||todayKey();if(!history.days[k])history.days[k]={learned:0,reviewed:0,newIntro:0};return history.days[k];}
function bumpStreak(){
  var t=todayKey(); if(history.streak.last===t)return;
  var y=new Date();y.setDate(y.getDate()-1);
  history.streak.count = (history.streak.last===todayKey(y))? history.streak.count+1 : 1;
  history.streak.last=t;
}

/* ===== SRS ===== */
function schedule(p,step){
  p.intervalStep=step; p.masteryLevel=step;
  if(step<=0){p.intervalDays=0;p.nextReview=now()+10*60*1000;}
  else{var d=LADDER_DAYS[Math.min(step-1,LADDER_DAYS.length-1)];p.intervalDays=d;p.nextReview=now()+d*86400000;}
}
function answer(id,kind){
  var p=P(id), wasNew=(p.status==="new"); var t=todayKey();
  bumpStreak();
  if(wasNew){dayRec().newIntro++; dayRec().learned++;}
  p.lastReviewed=now();
  if(kind==="no"){
    p.wrongCount++; p.status="learning"; schedule(p,0);
  }else if(kind==="maybe"){
    p.uncertainCount++; if(p.status==="new")p.status="learning";
    p.nextReview=now()+1*86400000; p.intervalDays=1;
  }else{ // ok
    p.correctCount++;
    if(p.correctDays.indexOf(t)<0)p.correctDays.push(t);
    schedule(p,(p.intervalStep||0)+1);
    p.status = (p.correctDays.length>=3) ? "mastered" : "reviewing";
  }
  if(!wasNew) dayRec().reviewed++;
  saveAll();
}

/* ===== scope / queue building ===== */
function isDue(id){var p=progress[id];return p&&p.nextReview&&p.nextReview<=now();}
function isWeak(id){var p=progress[id];if(!p)return false;var tot=p.correctCount+p.wrongCount;return p.wrongCount>=2||(tot>=3&&p.correctCount/tot<0.5);}
function baseLevelWords(level){return VOCAB.filter(function(w){return w.level===level;}).map(function(w){return w.id;});}
function dailyRemaining(){var r=settings.dailyNew-(dayRec().newIntro||0);return r>0?r:0;}

function buildQueue(scope){
  // scope: {type, level, pack, lesson, packs}
  var ids=[];
  var lvl=scope.level||ui.level;
  if(scope.type==="lesson"){ids=VOCAB.filter(function(w){return w.pack===scope.pack&&w.lesson===scope.lesson;}).map(function(w){return w.id;});}
  else if(scope.type==="pack"){ids=VOCAB.filter(function(w){return w.pack===scope.pack;}).map(function(w){return w.id;});}
  else if(scope.type==="packs"){ids=VOCAB.filter(function(w){return scope.packs.indexOf(w.pack)>=0;}).map(function(w){return w.id;});}
  else if(scope.type==="level"){ids=baseLevelWords(lvl);}
  else if(scope.type==="new"){ids=baseLevelWords(lvl).filter(function(id){return !hasProg(id)||progress[id].status==="new";});}
  else if(scope.type==="review"){ids=baseLevelWords(lvl).filter(isDue);}
  else if(scope.type==="weak"){ids=baseLevelWords(lvl).filter(isWeak);}
  else if(scope.type==="fav"){ids=baseLevelWords(lvl).filter(function(id){return progress[id]&&progress[id].favorite;});}
  else if(scope.type==="reviewAll"){ // 復習タブ: 全レベルの期限到来
    ids=VOCAB.filter(function(w){return SHOW_LEVELS.indexOf(w.level)>=0;}).map(function(w){return w.id;}).filter(isDue);
  }
  // cap new-word intake for broad/auto scopes only (explicit lesson/pack are studied in full)
  if(["level","new"].indexOf(scope.type)>=0){
    var rem=dailyRemaining();
    var fresh=ids.filter(function(id){return !hasProg(id)||progress[id].status==="new";});
    var known=ids.filter(function(id){return hasProg(id)&&progress[id].status!=="new";});
    if(fresh.length>rem) fresh=fresh.slice(0,rem);
    ids=known.concat(fresh);
  }
  ids=orderIds(ids, scope.type==="review"||scope.type==="reviewAll" ? "due" : settings.shuffle);
  return ids;
}
function orderIds(ids,mode){
  var a=ids.slice();
  if(mode==="random"){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}}
  else if(mode==="weak"){a.sort(function(x,y){return (P2w(y))-(P2w(x));});}
  else if(mode==="due"){a.sort(function(x,y){var px=progress[x],py=progress[y];return (px&&px.nextReview||0)-(py&&py.nextReview||0);});}
  // "order" = keep registration order (VOCAB order). ids may already be in order.
  return a;
}
function P2w(id){var p=progress[id];if(!p)return 0;return p.wrongCount*2 - p.correctCount;}

/* start a session */
function startSession(scope,label,origin){
  var list=buildQueue(scope);
  if(!list.length){toast("対象の単語がありません");return;}
  ui.session={list:list, pos:0, revealed:false, origin:origin||"study", label:label||"", scope:scope, retry:[]};
  if(origin==="review"){ui.reviewSub="study";} else {ui.wordSub="study";}
  saveUI();render();
}
function endSession(){
  if(ui.session&&ui.session.origin==="review"){ui.reviewSub="list";} else {ui.wordSub="select";}
  ui.session=null;saveUI();render();
}

/* ===== rendering ===== */
function render(){
  ["word","compose","review","progress"].forEach(function(v){
    var el=document.getElementById("tab-"+v); if(el)el.className=(ui.view===v?"on":"");
  });
  var m=document.getElementById("main");
  if(!m){m=document.createElement("main");m.id="main";(document.body||document.documentElement).appendChild(m);}
  var html="";
  if(ui.view==="word") html = ui.wordSub==="study"&&ui.session ? renderStudy() : renderWordSelect();
  else if(ui.view==="compose") html = (ui.composeSub==="study"&&ui.composeSession)?renderComposeStudy():renderCompose();
  else if(ui.view==="review") html = ui.reviewSub==="study"&&ui.session ? renderStudy() : renderReview();
  else html = renderProgress();
  m.innerHTML=html;
  // open detailed by default?
  if(settings.detailOpen){var d=m.querySelector("details.more"); if(d)d.open=true;}
}

var CMAP={}; COMPOSE.forEach(function(c){CMAP[c.id]=c;});
var COMPOSE_UNITS=[]; (function(){var s={};COMPOSE.forEach(function(c){if(!s[c.unit]){s[c.unit]=1;COMPOSE_UNITS.push(c.unit);}});})();
var COMPOSE_GP=[]; (function(){var s={};COMPOSE.forEach(function(c){if(!s[c.grammarPoint]){s[c.grammarPoint]=1;COMPOSE_GP.push(c.grammarPoint);}});})();
function unitGP(u){var c=COMPOSE.filter(function(x){return x.unit===u;})[0];return c?c.grammarPoint:"";}

function CP(id){
  if(!cprogress[id]) cprogress[id]={status:"new",correctCount:0,uncertainCount:0,wrongCount:0,
    lastReviewed:null,nextReview:null,favorite:false,correctDays:[]};
  return cprogress[id];
}
function cIsDue(id){var p=cprogress[id];return p&&p.nextReview&&p.nextReview<=now();}
function cIsWeak(id){var p=cprogress[id];if(!p)return false;var tot=p.correctCount+p.wrongCount;return p.wrongCount>=2||(tot>=3&&p.correctCount/tot<0.5);}
function composeStats(f){
  var arr=COMPOSE.filter(f),total=arr.length,learned=0,mastered=0,due=0;
  arr.forEach(function(c){var p=cprogress[c.id];if(p&&p.status!=="new")learned++;if(p&&p.status==="mastered")mastered++;if(cIsDue(c.id))due++;});
  return {total:total,learned:learned,mastered:mastered,due:due,pct:total?Math.round(learned/total*100):0};
}
function composeAnswer(id,kind){
  var p=CP(id), wasNew=(p.status==="new"), t=todayKey();
  bumpStreak(); if(wasNew)dayRec().learned++; p.lastReviewed=now();
  if(kind==="no"){p.wrongCount++;p.status="learning";p.nextReview=now()+10*60*1000;}       // できない→10分後
  else if(kind==="maybe"){p.uncertainCount++;if(p.status==="new")p.status="learning";p.nextReview=now()+86400000;} // 迷った→翌日
  else{p.correctCount++;if(p.correctDays.indexOf(t)<0)p.correctDays.push(t);                 // できた→3日後
       if(p.correctDays.length>=3){p.status="mastered";p.nextReview=now()+7*86400000;}        // 別日3回でmastered
       else{p.status="reviewing";p.nextReview=now()+3*86400000;}}
  if(!wasNew)dayRec().reviewed++; saveAll();
}
function buildComposeList(scope){
  var arr;
  if(scope.type==="unit"){var u=COMPOSE_UNITS[scope.unit];arr=COMPOSE.filter(function(c){return c.unit===u;}).map(function(c){return c.id;});}
  else if(scope.type==="gp"){arr=COMPOSE.filter(function(c){return c.grammarPoint===scope.gp;}).map(function(c){return c.id;});}
  else if(scope.type==="new"){arr=COMPOSE.filter(function(c){return !cprogress[c.id]||cprogress[c.id].status==="new";}).map(function(c){return c.id;}).slice(0,20);}
  else if(scope.type==="review"){arr=COMPOSE.map(function(c){return c.id;}).filter(cIsDue).slice(0,20);}
  else if(scope.type==="weak"){arr=COMPOSE.map(function(c){return c.id;}).filter(cIsWeak).slice(0,20);}
  else if(scope.type==="random"){arr=COMPOSE.map(function(c){return c.id;});for(var i=arr.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var x=arr[i];arr[i]=arr[j];arr[j]=x;}arr=arr.slice(0,20);}
  else arr=[];
  return arr;
}

     '<span class="small muted">'+(s.pos+1)+'/'+s.list.length+'</span></div>';
  h+='<div class="card qcard">';
  h+='<button class="star '+(p.favorite?"on":"")+'" data-act="cfav" data-val="'+c.id+'">'+(p.favorite?"★":"☆")+'</button>';

  h+='<div class="jp" style="margin-top:8px">'+esc(c.ja)+'</div>';
  if(!s.revealed){
    h+='</div><button class="btn full" data-act="creveal" style="margin-top:14px;background:var(--gold);border-color:var(--gold)">答えを見る</button>';
  }else{
    h+='<div class="kgbig" style="margin-top:10px;font-size:30px">'+esc(c.ky)+'</div>';
    h+='<div class="kana">'+esc(c.kana)+'</div>';
    h+='<div class="small muted">'+esc(c.roma)+'</div>';
    h+='<div class="grambox"><div class="h">文法解説（'+esc(c.grammarPoint)+'）</div><div class="b">'+esc(c.grammar)+'</div></div>';
    if(c.targetWords&&c.targetWords.length)h+='<div class="kv" style="justify-content:center;margin-top:8px">'+c.targetWords.map(function(w){return '<span>'+esc(w)+'</span>';}).join("")+'</div>';

/* ----- 進捗 ----- */
function renderProgress(){
  function lv(level){var ids=baseLevelWords(level);var m=0,l=0;ids.forEach(function(id){var p=progress[id];if(p&&p.status==="mastered")m++;if(p&&p.status!=="new")l++;});return {total:ids.length,learned:l,mastered:m};}
  var a1=lv("A1"),a2=lv("A2");
  var allIds=VOCAB.filter(function(w){return SHOW_LEVELS.indexOf(w.level)>=0;}).map(function(w){return w.id;});
  var learning=allIds.filter(function(id){return progress[id]&&progress[id].status==="learning";}).length;
  var weak=allIds.filter(isWeak).length;
  var t=dayRec(todayKey());
  var weekN=0; for(var i=0;i<7;i++){var d=new Date();d.setDate(d.getDate()-i);var r=history.days[todayKey(d)];if(r)weekN+=(r.learned+r.reviewed);}
  var h="";
  function lvbar(name,o){var pc=Math.round(o.learned/o.total*100);var pm=Math.round(o.mastered/o.total*100);
    return '<div class="card" style="padding:14px;margin-bottom:10px"><div style="display:flex;justify-content:space-between"><b>'+name+'</b><span class="small muted">学習 '+o.learned+' / '+o.total+'（定着 '+o.mastered+'）</span></div>'+
    '<div class="bar" style="margin-top:8px"><i style="width:'+pc+'%"></i></div>'+
    '<div class="bar" style="margin-top:5px;background:#EFE7D4"><i style="width:'+pm+'%;background:var(--good)"></i></div>'+
    '<div class="small muted" style="margin-top:4px">青=学習済 / 緑=定着</div></div>';}
  h+=lvbar("A1（900語）",a1);
  h+=lvbar("A2（400語）",a2);
  // 瞬間作文の集計
  var cAll=COMPOSE.length;
  var cLearned=COMPOSE.filter(function(c){return cprogress[c.id]&&cprogress[c.id].status!=="new";}).length;
  var cMastered=COMPOSE.filter(function(c){return cprogress[c.id]&&cprogress[c.id].status==="mastered";}).length;
  var cNew=cAll-cLearned;
  var cDue=COMPOSE.map(function(c){return c.id;}).filter(cIsDue).length;
  var cWeak=COMPOSE.map(function(c){return c.id;}).filter(cIsWeak).length;
  h+=lvbar("A2 瞬間作文（400文）",{total:cAll,learned:cLearned,mastered:cMastered});
  h+='<div class="stat" style="margin:12px 0">'+
     statbox(a1.learned+a2.learned,"単語 学習済み")+statbox(a1.mastered+a2.mastered,"単語 定着")+
     statbox(learning,"単語 学習中")+statbox(weak,"単語 苦手")+
     statbox(cLearned,"作文 学習済み")+statbox(cMastered,"作文 定着")+
     statbox(cNew,"作文 未学習")+statbox(cDue,"作文 復習待ち")+
     statbox(cWeak,"作文 苦手")+statbox(history.streak.count||0,"連続日数")+
     statbox(t.learned||0,"今日の学習")+statbox(t.reviewed||0,"今日の復習")+'</div>';
  h+='<div class="h2">パック別の進捗（単語）</div>';
  SHOW_LEVELS.forEach(function(level){
    packsOf(level).forEach(function(p){var st=packStats(p);
      h+='<div style="margin-bottom:9px"><div style="display:flex;justify-content:space-between" class="small"><span>'+esc(p.id)+' '+esc(p.title)+'</span><span class="muted">'+st.learned+'/'+st.total+'</span></div><div class="bar" style="margin-top:4px"><i style="width:'+st.pct+'%"></i></div></div>';
    });
  });
  h+='<div class="h2">ユニット別の進捗（瞬間作文）</div>';
  COMPOSE_UNITS.forEach(function(u){var st=composeStats(function(c){return c.unit===u;});
    h+='<div style="margin-bottom:9px"><div style="display:flex;justify-content:space-between" class="small"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:74%">'+esc(u)+'</span><span class="muted">'+st.learned+'/'+st.total+'</span></div><div class="bar" style="margin-top:4px"><i style="width:'+st.pct+'%"></i></div></div>';
  });
  h+='<button class="btn full ghost" data-act="settings" style="margin:16px 0 8px">設定・バックアップ・教材情報</button>';
  return h;
}
function statbox(n,l){return '<div class="b"><div class="n">'+n+'</div><div class="l">'+l+'</div></div>';}

/* ===== backup / restore / reset (v3) ===== */
function exportData(){
  var data={appVersion:APP_VERSION,dataVersion:DATA_VERSION,exportedAt:new Date().toISOString(),
    settings:settings,vocabProgress:progress,composeProgress:cprogress,
    streak:history.streak,learningHistory:history.days};
  var blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  var url=URL.createObjectURL(blob); var a=document.createElement("a");
  a.href=url; a.download="kyrgyzcha_backup_"+todayKey()+".json"; document.body.appendChild(a); a.click();
  setTimeout(function(){URL.revokeObjectURL(url);a.remove();},100);
  toast("バックアップを書き出しました");
}
function importData(){
  var inp=document.createElement("input"); inp.type="file"; inp.accept="application/json,.json";
  inp.onchange=function(){var f=inp.files[0]; if(!f)return; var r=new FileReader();
    r.onload=function(){try{var d=JSON.parse(r.result);
      if(d.vocabProgress)progress=d.vocabProgress; else if(d.progress)progress=d.progress; // v3 / 旧v2両対応
      if(d.composeProgress)cprogress=d.composeProgress;
      if(d.settings)settings=Object.assign(settings,d.settings);
      if(d.streak)history.streak=d.streak;
      if(d.learningHistory)history.days=d.learningHistory;
      saveAll();closeSheet();render();toast("復元しました");
    }catch(e){toast("ファイルを読み込めませんでした");}};
    r.readAsText(f);};
  inp.click();
}
function resetData(){
  if(!confirm("学習進捗（単語・作文）をすべて初期化します。よろしいですか？（バックアップの書き出しを推奨）"))return;
  lset(K.legacy+"_beforeReset_"+Date.now(), {progress:progress,cprogress:cprogress,history:history});
  progress={}; cprogress={}; history={streak:{count:0,last:null},days:{}}; ui.session=null; ui.composeSession=null;
  saveAll();closeSheet();render();toast("初期化しました");
}

/* ===== modal helpers ===== */
function openSheet(inner){document.getElementById("modal").innerHTML='<div class="ovl" data-act="ovl"><div class="sheet">'+inner+'</div></div>';}
function closeSheet(){document.getElementById("modal").innerHTML="";}
function toast(msg){var t=document.getElementById("toast");t.textContent=msg;t.className="toast show";setTimeout(function(){t.className="toast";},1600);}

/* ===== events ===== */
document.body.addEventListener("click",function(e){
  var t=e.target.closest("[data-act]"); if(!t)return;
  var a=t.getAttribute("data-act");
  var V=function(n){return t.getAttribute(n);};

  if(a==="tab"){ui.view=V("data-val");saveUI();render();return;}
  if(a==="settings"){settingsSheet();return;}
  if(a==="closesheet"){closeSheet();return;}
  if(a==="ovl"){ if(e.target.classList.contains("ovl")) closeSheet(); return;}

  // settings changes
  if(a==="daily"){settings.dailyNew=+V("data-val");saveAll();if(document.querySelector(".sheet"))settingsSheet();render();return;}
  if(a==="kana"){settings.kanaMode=V("data-val");saveAll();settingsSheet();return;}
  if(a==="dir"){settings.direction=V("data-val");saveAll();settingsSheet();return;}
  if(a==="shuf"){settings.shuffle=V("data-val");saveAll();settingsSheet();return;}
  if(a==="detail"){settings.detailOpen=(V("data-val")==="true");saveAll();settingsSheet();return;}
  if(a==="export"){exportData();return;}
  if(a==="import"){importData();return;}
  if(a==="reset"){resetData();return;}

  // word select
  if(a==="level"){ui.level=V("data-val");ui.pickPacks=[];saveUI();render();return;}
  if(a==="scope"){var type=V("data-type");startSession({type:type,level:ui.level},scopeLabel(type),"study");return;}
  if(a==="toggle200"){ui.pick200=!ui.pick200; ui.pickPacks=[]; saveUI(); render(); return;}
  if(a==="pack"){
     if(ui.pick200){var id=V("data-val");var i=ui.pickPacks.indexOf(id);
       if(i>=0)ui.pickPacks.splice(i,1); else if(ui.pickPacks.length<2)ui.pickPacks.push(id);
       saveUI();render();return;}
     packSheet(V("data-val"));return;}
  if(a==="start200"){if(ui.pickPacks.length){startSession({type:"packs",level:ui.level,packs:ui.pickPacks.slice()},ui.pickPacks.join("+"),"study");ui.pick200=false;ui.pickPacks=[];}return;}
  if(a==="startpack"){closeSheet();startSession({type:"pack",level:ui.level,pack:V("data-val")},V("data-val"),"study");return;}
  if(a==="startlesson"){closeSheet();startSession({type:"lesson",level:ui.level,pack:V("data-pack"),lesson:+V("data-lesson")},V("data-pack")+" L"+V("data-lesson"),"study");return;}
  if(a==="resume"){ui.wordSub="study";saveUI();render();return;}

  // study card
  if(a==="reveal"){ui.session.revealed=true;saveUI();render();return;}
  if(a==="kanapeek"){ui.session.kanaPeek=true;render();return;}
  if(a==="fav"){var id=V("data-val");var p=P(id);p.favorite=!p.favorite;saveAll();render();return;}
  if(a==="play"){toast("音声は今後対応予定です");return;}
  if(a==="endsession"){endSession();return;}
  if(a==="grade"){
    var s=ui.session,id=s.list[s.pos],kind=V("data-val");
    answer(id,kind);
    if(kind==="no"){ s.list.push(id); } // 同セッション内で再出題
    s.pos++; s.revealed=false; s.kanaPeek=false; saveUI(); render(); return;
  }

  // review
  if(a==="startreview"){startSession({type:"reviewAll"},"今日の復習","review");return;}
  if(a==="reviewscope"){var type=V("data-type");
    var sc = type==="weak"?{type:"weak",level:ui.level}: type==="maybe"?{type:"reviewAll"}: type==="recent"?{type:"reviewAll"}:{type:"reviewAll"};
    // for weak across both levels:
    if(type==="weak"){startSession({type:"weakAll"},"苦手","review");return;}
    startSession(sc,"復習","review");return;}

  // compose（瞬間作文）
  if(a==="cmode"){var ct=V("data-type");startCompose({type:ct},{new:"未学習",review:"復習対象",weak:"苦手",random:"ランダム20"}[ct]);return;}
  if(a==="cunit"){var un=+V("data-val");startCompose({type:"unit",unit:un},COMPOSE_UNITS[un]);return;}
  if(a==="creveal"){if(ui.composeSession){ui.composeSession.revealed=true;saveUI();render();}return;}
  if(a==="cfav"){var cid=V("data-val");var cp=CP(cid);cp.favorite=!cp.favorite;saveAll();render();return;}
  if(a==="cendsession"){endCompose();return;}
  if(a==="cgrade"){
    var cs=ui.composeSession,cid2=cs.list[cs.pos],ck=V("data-val");
    composeAnswer(cid2,ck);
    if(ck==="no"){cs.list.push(cid2);}   // できない→同セッション内で再出題
    cs.pos++; cs.revealed=false; saveUI(); render(); return;
  }
  if(a==="memo"){memoSheet();return;}
});

// weakAll scope support
var _bq=buildQueue;
buildQueue=function(scope){
  if(scope.type==="weakAll"){var ids=VOCAB.filter(function(w){return SHOW_LEVELS.indexOf(w.level)>=0;}).map(function(w){return w.id;}).filter(isWeak);return orderIds(ids,"weak");}
  return _bq(scope);
};

/* ===== migration to v3 (v2優先、なければv1) ===== */
(function migrate(){
  if(lget(K.prog,null)!==null) return; // 既にv3
  // --- v2 -> v3 ---
  var v2prog=lget("kyrgyzApp_v2_progress",null);
  if(v2prog!==null){
    lset(K.legacy+"_v2_"+Date.now(),{progress:v2prog,settings:lget("kyrgyzApp_v2_settings",null),history:lget("kyrgyzApp_v2_history",null),at:new Date().toISOString()});
    progress=v2prog||{};
    var v2set=lget("kyrgyzApp_v2_settings",null); if(v2set)settings=Object.assign(settings,v2set);
    var v2hist=lget("kyrgyzApp_v2_history",null); if(v2hist)history=v2hist;
    saveAll(); return;
  }
  // --- v1 (kg_status / kg_custom) -> v3 ---
  var oldStatus=lget("kg_status",null), oldCustom=lget("kg_custom",null);
  if(!oldStatus&&!oldCustom) return;
  lset(K.legacy,{kg_status:oldStatus,kg_custom:oldCustom,at:new Date().toISOString()});
  var kyToId={}; VOCAB.forEach(function(w){kyToId[(w.word||"").toLowerCase().trim()]=w.id;});
  function applyOld(ky,val){
    var nid=kyToId[(ky||"").toLowerCase().trim()]; if(!nid)return;
    var p=P(nid);
    if(val==="known"){p.status="reviewing";p.correctCount=1;p.correctDays=[todayKey()];schedule(p,2);}
    else if(val==="weak"){p.status="learning";p.wrongCount=1;schedule(p,0);}
  }
  try{
    if(oldStatus){Object.keys(oldStatus).forEach(function(oid){
      if(oid.charAt(0)==="v"){var n=parseInt(oid.slice(1),10);if(LEGACY_KY[n])applyOld(LEGACY_KY[n],oldStatus[oid]);}
    });}
    if(oldCustom&&oldCustom.length){oldCustom.forEach(function(c){if(c&&c.ky)applyOld(c.ky,"weak");});}
  }catch(e){}
  saveAll();
})();

  if(!ui.view)ui.view="word";
  render();
}catch(err){showFatal((err&&err.stack)||err);}
